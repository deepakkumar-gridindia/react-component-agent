<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>React Component Generator</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #21262d;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #7c3aed;
      --accent-hover: #6d28d9;
      --green: #3fb950;
      --red: #f85149;
      --yellow: #d29922;
      --mono: 'Fira Code', 'Cascadia Code', 'Consolas', 'Monaco', monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      padding: 1.25rem 2rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .logo {
      width: 34px; height: 34px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    header h1 { font-size: 1.1rem; font-weight: 600; }
    header p { font-size: 0.8rem; color: var(--muted); margin-top: 1px; }
    .badge {
      margin-left: auto;
      font-size: 0.7rem;
      padding: 0.2rem 0.6rem;
      border-radius: 9999px;
      border: 1px solid var(--border);
      color: var(--muted);
    }

    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1.5rem 2rem;
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 1.25rem;
      align-items: start;
    }
    @media (max-width: 860px) {
      main { grid-template-columns: 1fr; padding: 1rem; }
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }
    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.65rem 1rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }
    .panel-title {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .btn-row { display: flex; gap: 0.4rem; }
    .btn {
      padding: 0.28rem 0.65rem;
      border-radius: 5px;
      font-size: 0.75rem;
      cursor: pointer;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      transition: all 0.12s;
      font-family: inherit;
    }
    .btn:hover { background: var(--surface2); color: var(--text); }

    textarea {
      display: block;
      width: 100%;
      min-height: 460px;
      background: var(--bg);
      border: none;
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.78rem;
      padding: 1rem;
      resize: vertical;
      outline: none;
      line-height: 1.75;
      tab-size: 2;
    }

    .right { display: flex; flex-direction: column; gap: 1rem; }

    .field { display: flex; flex-direction: column; gap: 0.4rem; padding: 1rem; }
    .field label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .input-row { display: flex; gap: 0.4rem; }
    input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.85rem;
      padding: 0.55rem 0.75rem;
      outline: none;
      font-family: var(--mono);
      transition: border-color 0.12s;
    }
    input:focus { border-color: var(--accent); }
    .hint {
      font-size: 0.72rem;
      color: var(--muted);
      line-height: 1.5;
    }
    .hint a { color: var(--accent); text-decoration: none; }
    .hint a:hover { text-decoration: underline; }

    .btn-generate {
      width: 100%;
      padding: 0.8rem;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.12s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      font-family: inherit;
    }
    .btn-generate:hover:not(:disabled) { background: var(--accent-hover); }
    .btn-generate:disabled { opacity: 0.55; cursor: not-allowed; }

    .log-wrap { padding: 0; }
    .log-area {
      background: var(--bg);
      font-family: var(--mono);
      font-size: 0.73rem;
      min-height: 180px;
      max-height: 280px;
      overflow-y: auto;
      padding: 0.75rem 1rem;
      line-height: 1.85;
      color: var(--muted);
    }
    .log-area::-webkit-scrollbar { width: 4px; }
    .log-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .log-line.ok { color: var(--green); }
    .log-line.err { color: var(--red); }
    .log-line.warn { color: var(--yellow); }

    .btn-download {
      width: 100%;
      padding: 0.8rem;
      background: var(--green);
      color: #0d1117;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.12s;
      display: none;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      font-family: inherit;
    }
    .btn-download:hover { opacity: 0.88; }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.25);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
      </svg>
    </div>
    <div>
      <h1>React Component Generator</h1>
      <p>Paste a JSON schema — get production-ready TypeScript components</p>
    </div>
    <span class="badge">Powered by Groq · llama-3.3-70b</span>
  </header>

  <main>
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">JSON Schema</span>
        <div class="btn-row">
          <button class="btn" id="loadExample">Load example</button>
          <button class="btn" id="clearBtn">Clear</button>
        </div>
      </div>
      <textarea id="schema" spellcheck="false" placeholder='Paste your JSON schema here…'></textarea>
    </div>

    <div class="right">
      <div class="panel">
        <div class="panel-header"><span class="panel-title">Groq API Key</span></div>
        <div class="field">
          <div class="input-row">
            <input type="password" id="apiKey" placeholder="gsk_…" autocomplete="off" />
            <button class="btn" id="toggleKey">Show</button>
          </div>
          <span class="hint">
            Optional if the server is pre-configured.<br>
            <a href="https://console.groq.com/keys" target="_blank" rel="noopener">Get a free key at console.groq.com →</a>
          </span>
        </div>
      </div>

      <button class="btn-generate" id="generateBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
        </svg>
        Generate Components
      </button>

      <div class="panel">
        <div class="panel-header"><span class="panel-title">Output Log</span></div>
        <div class="log-area" id="logArea"><span>Waiting for input…</span></div>
      </div>

      <button class="btn-download" id="downloadBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Download components.zip
      </button>
    </div>
  </main>

  <script>
    const EXAMPLE = {"$schema":"http://json-schema.org/draft-07/schema#","title":"Employee","type":"object","properties":{"id":{"type":"string"},"firstName":{"type":"string"},"lastName":{"type":"string"},"email":{"type":"string","format":"email"},"department":{"type":"string","enum":["Engineering","Design","Marketing","HR","Finance"]},"role":{"type":"string","enum":["junior","mid","senior","lead","manager"]},"salary":{"type":"number","minimum":0},"startDate":{"type":"string","format":"date"},"isActive":{"type":"boolean"},"skills":{"type":"array","items":{"type":"string"}}},"required":["id","firstName","lastName","email","department","role"]};

    const schemaEl   = document.getElementById('schema');
    const apiKeyEl   = document.getElementById('apiKey');
    const logAreaEl  = document.getElementById('logArea');
    const generateEl = document.getElementById('generateBtn');
    const downloadEl = document.getElementById('downloadBtn');

    document.getElementById('loadExample').onclick = () => {
      schemaEl.value = JSON.stringify(EXAMPLE, null, 2);
    };
    document.getElementById('clearBtn').onclick = () => { schemaEl.value = ''; };

    let keyVisible = false;
    document.getElementById('toggleKey').onclick = () => {
      keyVisible = !keyVisible;
      apiKeyEl.type = keyVisible ? 'text' : 'password';
      document.getElementById('toggleKey').textContent = keyVisible ? 'Hide' : 'Show';
    };

    function clearLog() {
      logAreaEl.innerHTML = '';
    }
    function addLog(msg, cls = '') {
      if (logAreaEl.querySelector('span') && !logAreaEl.querySelector('.log-line')) {
        logAreaEl.innerHTML = '';
      }
      const d = document.createElement('div');
      d.className = 'log-line' + (cls ? ' ' + cls : '');
      d.textContent = msg;
      logAreaEl.appendChild(d);
      logAreaEl.scrollTop = logAreaEl.scrollHeight;
    }

    function setBtn(loading) {
      generateEl.disabled = loading;
      generateEl.innerHTML = loading
        ? '<div class="spinner"></div> Generating…'
        : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg> Generate Components';
    }

    let pollTimer = null;
    let logOffset = 0;
    let currentJobId = null;

    async function poll(jobId) {
      try {
        const res = await fetch(`/status/${jobId}?offset=${logOffset}`);
        if (!res.ok) {
          const body = await res.json().catch(() => ({}));
          stopPoll();
          addLog(`Status error ${res.status}: ${body.detail || res.statusText}`, 'err');
          setBtn(false);
          return;
        }
        const data = await res.json();

        for (const line of data.logs) {
          logOffset++;
          const cls = line.startsWith('  ✓') ? 'ok'
                    : (line.startsWith('Error') || line.startsWith('Bad') || line.startsWith('  Rate')) ? 'warn'
                    : '';
          addLog(line, cls);
        }

        if (data.done) {
          stopPoll();
          setBtn(false);
          if (data.error) {
            addLog('Error: ' + data.error, 'err');
          } else if (data.ready) {
            addLog('All done — click below to download.', 'ok');
            downloadEl.style.display = 'flex';
            downloadEl.onclick = () => { window.location.href = `/download/${jobId}`; };
          }
        }
      } catch (e) {
        stopPoll();
        addLog('Network error: ' + e.message, 'err');
        setBtn(false);
      }
    }

    function stopPoll() {
      if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
    }

    generateEl.onclick = async () => {
      const raw = schemaEl.value.trim();
      if (!raw) { clearLog(); addLog('Please paste a JSON schema first.', 'err'); return; }

      let schema;
      try { schema = JSON.parse(raw); }
      catch (e) { clearLog(); addLog('Invalid JSON: ' + e.message, 'err'); return; }

      const apiKey = apiKeyEl.value.trim() || undefined;

      clearLog();
      downloadEl.style.display = 'none';
      logOffset = 0;
      stopPoll();

      setBtn(true);
      addLog('Submitting job…');

      try {
        const res = await fetch('/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ json_schema: schema, api_key: apiKey }),
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          addLog('Error: ' + (err.detail || res.statusText), 'err');
          setBtn(false);
          return;
        }
        const { job_id } = await res.json();
        currentJobId = job_id;
        addLog('Job started. Waiting for agent…');
        pollTimer = setInterval(() => poll(job_id), 1000);
      } catch (e) {
        addLog('Network error: ' + e.message, 'err');
        setBtn(false);
      }
    };
  </script>
</body>
</html>
